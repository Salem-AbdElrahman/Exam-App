<div class="fixed inset-0 z-[999] flex items-center justify-center bg-gray-900 bg-opacity-50 backdrop-blur-sm">
    <div class="relative bg-white rounded-lg shadow-xl w-full max-w-md p-8 mx-4">

        <button (click)="onClose()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
            <i class="fa-solid fa-xmark text-lg"></i>
        </button>

        <div class="mb-6">
            <div class="flex items-center gap-2 mb-2">
                <span class="text-blue-500 text-xs">◆</span>
                <div class="h-[1px] w-full border-t border-dotted border-gray-300"></div>
            </div>
            <h2 class="text-2xl font-bold text-[#4F4F4F]">Change Email</h2>
        </div>
          <!-- Strp1- ChangeEmail -->
        @if (currentStep === 'EMAIL') {
            <div class="space-y-4">
                <p class="text-[#2B82FB] font-semibold text-lg">Enter your new email</p>
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-medium text-gray-400">Email</label>
                    <input type="email" [(ngModel)]="email"
                        class="w-full p-3 bg-[#FDFDFD] border border-[#EBEBEB] rounded-lg focus:ring-1 focus:ring-blue-400 outline-none">
                </div>
                <button  (click)="onRequestEmailChange()" class="w-full bg-[#2B82FB] text-white py-3 rounded-lg font-bold flex items-center justify-center gap-2 mt-6">
                    Next <i class="fa-solid fa-chevron-right text-xs"></i>
                </button>
            </div>
        }
            <!-- Step2-Verify -->
        @else if (currentStep === 'OTP') {
            <div class="space-y-4">
                <p class="text-[#2B82FB] font-semibold text-lg">Verify OTP</p>
                <p class="text-sm text-gray-500">
                    Please enter the 6-digit code we sent to <br>
                    <span class="font-semibold text-gray-700">{{ email }}</span>.
                    <button (click)="currentStep = 'EMAIL'" class="text-blue-500 underline ml-1">Edit</button>
                </p>

                <div class="flex justify-between gap-2 py-4">
                    @for (item of otpArray; track $index) {
                        <input type="text" maxlength="1"
                            [(ngModel)]="otpArray[$index]"
                            (input)="moveFocus($event, $index)"
                            class="w-12 h-12 text-center border border-gray-200 rounded-lg text-lg font-bold focus:border-blue-500 outline-none shadow-sm bg-gray-50">
                    }
                </div>

                <div class="text-center mt-2">
                    <p class="text-xs text-gray-400 font-medium italic">
                        You can request another code in <span class="text-gray-600">60s</span>
                    </p>
                </div>

                <button (click)="onVerifyCode()" class="w-full bg-[#2B82FB] text-white py-3 rounded-lg font-bold mt-6 shadow-md">
                    Verify Code
                </button>
            </div>
        }

    </div>
</div>
