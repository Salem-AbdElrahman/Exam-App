<div class="w-full md:w-64 border-r border-[#F0F0F0] p-6 space-y-6">
                <div class="flex items-center gap-3 text-[#2B82FB] font-bold cursor-pointer"
                 [routerLink]="['/Account']" routerLinkActive="text-blue-600 bg-blue-100 px-4 py-2 border border-blue-600">
                    <i class="fa-regular fa-user"></i>
                    <span>Profile</span>
                </div>
                <div class="flex items-center gap-3 text-blue-600 hover:text-blue-700 cursor-pointer transition-all"
                [routerLink]="['/changePassword']" routerLinkActive="text-blue-600 bg-blue-100 px-4 py-2 border border-blue-600" >
                    <i class="fa-solid fa-lock"></i>
                    <span>Change Password</span>
                </div>
                <div class="pt-80">
        <button (click)="logout()"
                class="flex items-center gap-3 text-[#EB5757] bg-red-100 font-semibold hover:bg-red-50 p-2 transition-all w-full">
            <i class="fa-solid fa-arrow-right-from-bracket rotate-180"></i>
            <span>Logout</span>
        </button>
    </div>
            </div>
