<div class="fixed inset-0 z-[1000] flex items-center justify-center bg-gray-900 bg-opacity-50 backdrop-blur-sm">

    <div class="relative bg-white rounded-lg shadow-2xl w-full max-w-md p-10 mx-4 text-center">

        <button (click)="onCancel()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
            <i class="fa-solid fa-xmark"></i>
        </button>

        <div class="flex justify-center mb-6">
            <div class="text-red-500 text-5xl">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
        </div>

        <h2 class="text-[#EB5757] text-xl font-semibold mb-2">
            Are you sure you want to delete your account?
        </h2>

        <p class="text-gray-400 text-sm mb-10">
            This action is permanent and cannot be undone.
        </p>

        <div class="flex justify-center items-center gap-8">
            <button (click)="onCancel()"
                    class="text-gray-900 bg-gray-400 font-medium py-2 px-12 shadow-sm">
                Cancel
            </button>

            <button (click)="confirmDelete()"
                    class="bg-[#EB5757] text-white px-10 py-2  font-semibold shadow-md hover:bg-red-600 transition-all">
                Yes, delete
            </button>
        </div>

    </div>
</div>
