<div class="bg-gray-50 p-4">
<app-header-page
[title]="examTitle"
icon="fa-solid fa-book-open"
[showBack]="true"></app-header-page>
<div class="cards">
@for(exam of Exams;track exam.id){
    <div class="card bg-blue-50 grid grid-cols-[120px_1fr] items-center border border-gray-100 rounded-lg
  p-4 hover:shadow-sm transition-shadow mb-4">
<div class="bg-blue-50 rounded-lg border border-blue-400 w-24 h-24 p-2 flex items-center justify-center">
  <img [src]="exam.image" class="w-16 h-16 object-contain" [alt]="exam.title">
</div>
<div class="px-4">
  <div class="card-content flex items-center pl-6 justify-between">
<div class="card-title max-w-[60%]">
  <h3 class="text-blue-700 font-semibold text-lg mb-2">{{exam.title}}</h3>

</div>
<div class="details flex text-gray-800 font-normal items-end justify-between gap-1">
  <div class="flex items-center gap-1">
      <i class="fa-regular fa-circle-question"></i>
    <span class="whitespace-nowrap">{{exam.questionsCount}} questions</span>

  </div>
    <div class="clock flex items-center gap-1">
<i class="fa-solid fa-stopwatch"></i>
<span class="whitespace-nowrap">{{exam.duration}} minutes</span>
  </div>

</div>
</div>
  <p class="text-gray-500 text-sm align-middle font-semibold leading-snug mt-1 px-4 line-clamp-2"> {{exam.description}} </p>
<div class="flex items-end justify-end">
  <button class="bg-blue-600 text-white items-end justify-end text-sm mt-1 px-8 py-2 rounded hover:bg-blue-700 transition-colors font-medium" [routerLink]="['/Question',exam.id]" > Start<i class="fa-solid fa-arrow-right"></i></button>

</div>
</div>


</div>
}
</div>
