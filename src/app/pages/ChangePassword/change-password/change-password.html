<div class="flex-1 bg-[#F9F9F9] min-h-screen p-8">
  <div class="bg-white rounded-xl shadow-sm border border-[#E0E0E0] overflow-hidden max-w-5xl">
     <app-header-page
title="Account Settings"
icon="fa-regular fa-user"
[showBack]="true"></app-header-page>
    <div class="flex flex-col md:flex-row">
  <app-sidebar></app-sidebar>
<form [formGroup]="passwordForm" (ngSubmit)="updatePassword()" class="space-y-8 max-w-2xl w-full">

    <div class="flex flex-col gap-2 relative">
        <label class="text-sm font-semibold text-[#4F4F4F]">Current Password</label>
        <div class="relative">
            <input [type]="showCurrent ? 'text' : 'password'"
                   formControlName="currentPassword"
                   placeholder="••••••••"
                   class="w-full p-3 bg-[#FDFDFD] border border-[#EBEBEB] rounded-lg focus:outline-none focus:border-blue-400">
            <i (click)="showCurrent = !showCurrent"
               [class]="showCurrent ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash'"
               class="absolute right-4 top-4 text-gray-400 cursor-pointer"></i>
        </div>
    </div>

    <div class="flex flex-col gap-2 relative">
        <label class="text-sm font-semibold text-[#4F4F4F]">New Password</label>
        <div class="relative">
            <input [type]="showNew ? 'text' : 'password'"
                   formControlName="newPassword"
                   placeholder="••••••••"
                   class="w-full p-3 bg-[#FDFDFD] border border-[#EBEBEB] rounded-lg focus:outline-none focus:border-blue-400">
            <i (click)="showNew = !showNew"
               [class]="showNew ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash'"
               class="absolute right-4 top-4 text-gray-400 cursor-pointer"></i>
        </div>
    </div>

    <div class="flex flex-col gap-2 relative">
        <label class="text-sm font-semibold text-[#4F4F4F]">Confirm New Password</label>
        <div class="relative">
            <input [type]="showConfirm ? 'text' : 'password'"
                   formControlName="confirmPassword"
                   placeholder="••••••••"
                   class="w-full p-3 bg-[#FDFDFD] border border-[#EBEBEB] rounded-lg focus:outline-none focus:border-blue-400">
            <i (click)="showConfirm = !showConfirm"
               [class]="showConfirm ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash'"
               class="absolute right-4 top-4 text-gray-400 cursor-pointer"></i>
        </div>
    </div>

    <div class="flex justify-end pt-4">
        <button type="submit"
                class="bg-[#2B82FB] text-white px-12 py-3 rounded-lg font-bold shadow-md hover:bg-blue-600 transition-all">
            Update Password
        </button>
    </div>
</form>
</div>
  </div>
</div>
